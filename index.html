                    });
                    if (!allValid) {
                        alert('Invalid score.');
                        return false;
                    }
                    for (var i = 0; i < state.players.length; i++) {
                        var p = state.players[i];
                        if (!state.scores[p]) state.scores[p] = [];
                        while (state.scores[p].length <= idx) state.scores[p].push(null);
                        state.scores[p][idx] = values[p] !== undefined ? values[p] : 0;
                    }
                    return true;
                },
                renderStandings: function(state) {
                    var result = [];
                    for (var i = 0; i < state.players.length; i++) {
                        var p = state.players[i];
                        var scores = state.scores[p] || [];
                        var valid = scores.filter(function(s) { return s !== null && s !== undefined; });
                        var holes = valid.length;
                        var total = holes > 0 ? valid.reduce(function(a, b) { return a + b; }, 0) : null;
                        result.push({ player: p, holesPlayed: holes, total: total });
                    }
                    result.sort(function(a, b) {
                        if (a.total === null && b.total === null) return a.player.localeCompare(b.player);
                        if (a.total === null) return 1;
                        if (b.total === null) return -1;
                        if (a.total !== b.total) return a.total - b.total;
                        if (a.holesPlayed !== b.holesPlayed) return b.holesPlayed - a.holesPlayed;
                        return a.player.localeCompare(b.player);
                    });
                    var rank = 1;
                    for (var j = 0; j < result.length; j++) {
                        if (j === 0) {
                            result[j].rank = rank;
                        } else {
                            var prev = result[j - 1];
                            var curr = result[j];
                            if (curr.total === null && prev.total === null) {
                                result[j].rank = prev.rank;
                            } else if (curr.total === null) {
                                result[j].rank = j + 1;
                            } else if (prev.total !== null && curr.total === prev.total && curr.holesPlayed === prev
                                .holesPlayed) {
                                result[j].rank = prev.rank;
                            } else {
                                result[j].rank = j + 1;
                            }
                        }
                    }
                    return result;
                },
                renderHistory: function(state) {
                    var players = state.players;
                    if (!players || players.length === 0) return { isEmpty: true };
                    var holeCount = (state.scores[players[0]] || []).length;
                    if (holeCount === 0) return { isEmpty: true };
                    var rows = [];
                    for (var h = holeCount - 1; h >= 0; h--) {
                        var row = { hole: h + 1, scores: {} };
                        for (var i = 0; i < players.length; i++) {
                            var p = players[i];
                            row.scores[p] = (state.scores[p] && state.scores[p][h] !== undefined) ? state.scores[p][
                                h
                            ] : 0;
                        }
                        rows.push(row);
                    }
                    var totals = {};
                    for (var i = 0; i < players.length; i++) {
                        var p = players[i];
                        var scores = state.scores[p] || [];
                        var valid = scores.filter(function(s) { return s !== null && s !== undefined; });
                        totals[p] = valid.reduce(function(a, b) { return a + b; }, 0);
                    }
                    return { isEmpty: false, rows: rows, totals: totals, players: players };
                },
                getTotalScore: function(state, player) {
                    var scores = state.scores[player] || [];
                    var valid = scores.filter(function(s) { return s !== null && s !== undefined; });
                    return valid.reduce(function(a, b) { return a + b; }, 0);
                }
            };

            var TeamMode = {
                init: function(state) {
                    if (!state.teamShuffleOrder || state.teamShuffleOrder.length === 0) {
                        this.reseedShuffle(state);
                    }
                    if (!state.teamScores) state.teamScores = {};
                    if (!state.oddPlayerScores) state.oddPlayerScores = {};
                    if (!state.teamShuffleIndex) state.teamShuffleIndex = 0;
                    if (!state.teamHoleInShuffle) state.teamHoleInShuffle = 0;
                },
                reseedShuffle: function(state) {
                    var shuffled = shuffleArray(state.players);
                    state.teamShuffleOrder = shuffled;
                    state.teamShuffleIndex = 0;
                    state.teamHoleInShuffle = 0;
                },
                getPairKey: function(p1, p2) {
                    var sorted = [p1, p2].sort();
                    return sorted.join('-');
                },
                getPairsForCurrentHole: function(state) {
                    var players = state.players;
                    var count = players.length;
                    var table = PAIRING_TABLES[count];
                    if (!table) return null;
                    var shuffleOrder = state.teamShuffleOrder;
                    var holeInShuffle = state.teamHoleInShuffle;
                    if (shuffleOrder.length !== count || !shuffleOrder.every(function(p) { return players.includes(p); })) {
                        this.reseedShuffle(state);
                        return this.getPairsForCurrentHole(state);
                    }
                    var tableIndex = holeInShuffle % table.length;
                    var row = table[tableIndex];
                    var letterMap = getPlayerLetterMap(shuffleOrder);
                    var pairs = row.map(function(pair) { return pair.map(function(letter) { return letterMap[letter]; }); });
                    var allPlayersInPairs = pairs.flat();
                    var oddPlayer = players.find(function(p) { return !allPlayersInPairs.includes(p); });
                    return { pairs: pairs, oddPlayer: oddPlayer };
                },
                renderPlay: function(state, container, callbacks) {
                    var players = state.players;
                    if (!players || players.length === 0) {
                        container.innerHTML =
                            '<div class="text-center text-muted" style="padding:30px 0;"><p style="font-size:16px;">No players</p></div>';
                        return;
                    }
                    var pairData = this.getPairsForCurrentHole(state);
                    if (!pairData) {
                        container.innerHTML = '<div class="text-center text-muted">No pairing table for ' + players
                            .length + ' players.</div>';
                        return;
                    }
                    var pairs = pairData.pairs;
                    var oddPlayer = pairData.oddPlayer;
                    var idx = state.currentHole - 1;
                    var options = getScoreOptions();
                    var html = '<div class="hole-header">⛳ Hole ' + state.currentHole +
                        '</div><div class="score-entry">';
                    for (var i = 0; i < pairs.length; i++) {
                        var pair = pairs[i];
                        var key = this.getPairKey(pair[0], pair[1]);
                        var currentVal = (state.teamScores[key] && state.teamScores[key][idx] !== undefined) ? state
                            .teamScores[key][idx] : 0;
                        html += '<div class="score-row" data-pair="' + escapeHtml(key) +
                            '"><span class="s-name">' + escapeHtml(pair.join(' & ')) +
                            '</span><div class="s-select"><select data-pair="' + escapeHtml(key) + '">' +
                            getSelectOptionsHTML(options, currentVal) +
                            '</select></div></div>';
                    }
                    if (oddPlayer) {
                        var setting = state.settings.oddPlayerHandling || 'zero';
                        if (setting === 'record') {
                            var currentVal2 = (state.oddPlayerScores[oddPlayer] && state.oddPlayerScores[oddPlayer][
                                idx
                            ] !== undefined) ? state.oddPlayerScores[oddPlayer][idx] : 0;
                            html += '<div class="score-row" data-player="' + escapeHtml(oddPlayer) +
                                '"><span class="s-name">' + escapeHtml(oddPlayer) +
                                ' (odd)</span><div class="s-select"><select data-odd="' + escapeHtml(oddPlayer) +
                                '">' + getSelectOptionsHTML(options, currentVal2) +
                                '</select></div></div>';
                        } else {
                            html += '<div class="odd-player-note">' + escapeHtml(oddPlayer) +
                                ' is without a partner and gets 0 (Par) for this hole.</div>';
                        }
                    }
                    html += '<div class="save-row"><button id="saveHoleBtn" class="success">Save hole</button></div></div>';
                    container.innerHTML = html;
                    var saveBtn = container.querySelector('#saveHoleBtn');
                    if (saveBtn) {
                        saveBtn.addEventListener('click', function() { callbacks.onSaveHole(); });
                    }
                    setTimeout(function() {
                        var firstSelect = container.querySelector('select');
                        if (firstSelect) firstSelect.focus();
                    }, 100);
                },
                saveHole: function(state) {
                    var idx = state.currentHole - 1;
                    var pairSelects = document.querySelectorAll('#tab-playing select[data-pair]');
                    var oddSelects = document.querySelectorAll('#tab-playing select[data-odd]');
                    for (var k = 0; k < pairSelects.length; k++) {
                        var sel = pairSelects[k];
                        var key = sel.dataset.pair;
                        var val = parseInt(sel.value);
                        if (isNaN(val)) {
                            alert('Invalid score for pair.');
                            return false;
                        }
                        if (!state.teamScores[key]) state.teamScores[key] = [];
                        while (state.teamScores[key].length <= idx) state.teamScores[key].push(null);
                        state.teamScores[key][idx] = val;
                    }
                    for (var m = 0; m < oddSelects.length; m++) {
                        var sel2 = oddSelects[m];
                        var player = sel2.dataset.odd;
                        var val2 = parseInt(sel2.value);
                        if (isNaN(val2)) {
                            alert('Invalid score for odd player.');
                            return false;
                        }
                        if (!state.oddPlayerScores[player]) state.oddPlayerScores[player] = [];
                        while (state.oddPlayerScores[player].length <= idx) state.oddPlayerScores[player].push(null);
                        state.oddPlayerScores[player][idx] = val2;
                    }
                    var pairData = this.getPairsForCurrentHole(state);
                    if (pairData && pairData.oddPlayer) {
                        var odd = pairData.oddPlayer;
                        var setting = state.settings.oddPlayerHandling || 'zero';
                        if (setting === 'zero') {
                            if (!state.oddPlayerScores[odd]) state.oddPlayerScores[odd] = [];
                            while (state.oddPlayerScores[odd].length <= idx) state.oddPlayerScores[odd].push(null);
                            state.oddPlayerScores[odd][idx] = 0;
                        }
                    }
                    var table = PAIRING_TABLES[state.players.length];
                    if (table) {
                        var nextHole = state.teamHoleInShuffle + 1;
                        if (nextHole >= table.length) {
                            this.reseedShuffle(state);
                            state.teamHoleInShuffle = 0;
                        } else {
                            state.teamHoleInShuffle = nextHole;
                        }
                    }
                    return true;
                },
                renderStandings: function(state) {
                    var players = state.players;
                    var result = [];
                    for (var i = 0; i < players.length; i++) {
                        var p = players[i];
                        var total = this.getTotalScore(state, p);
                        var holes = this.getHoleCount(state);
                        result.push({ player: p, holesPlayed: holes, total: holes > 0 ? total : null });
                    }
                    result.sort(function(a, b) {
                        if (a.total === null && b.total === null) return a.player.localeCompare(b.player);
                        if (a.total === null) return 1;
                        if (b.total === null) return -1;
                        if (a.total !== b.total) return a.total - b.total;
                        if (a.holesPlayed !== b.holesPlayed) return b.holesPlayed - a.holesPlayed;
                        return a.player.localeCompare(b.player);
                    });
                    var rank = 1;
                    for (var j = 0; j < result.length; j++) {
                        if (j === 0) {
                            result[j].rank = rank;
                        } else {
                            var prev = result[j - 1];
                            var curr = result[j];
                            if (curr.total === null && prev.total === null) {
                                result[j].rank = prev.rank;
                            } else if (curr.total === null) {
                                result[j].rank = j + 1;
                            } else if (prev.total !== null && curr.total === prev.total && curr.holesPlayed === prev
                                .holesPlayed) {
                                result[j].rank = prev.rank;
                            } else {
                                result[j].rank = j + 1;
                            }
                        }
                    }
                    return result;
                },
                renderHistory: function(state) {
                    var players = state.players;
                    if (!players || players.length === 0) return { isEmpty: true };
                    var holeCount = this.getHoleCount(state);
                    if (holeCount === 0) return { isEmpty: true };
                    var rows = [];
                    for (var h = holeCount - 1; h >= 0; h--) {
                        var row = { hole: h + 1, pairs: {}, odd: {} };
                        for (var key in state.teamScores) {
                            var scores = state.teamScores[key] || [];
                            if (scores[h] !== undefined && scores[h] !== null) {
                                row.pairs[key] = scores[h];
                            }
                        }
                        for (var i = 0; i < players.length; i++) {
                            var p = players[i];
                            var oddScores = state.oddPlayerScores[p] || [];
                            if (oddScores[h] !== undefined && oddScores[h] !== null) {
                                row.odd[p] = oddScores[h];
                            }
                        }
                        rows.push(row);
                    }
                    var totals = {};
                    for (var i = 0; i < players.length; i++) {
                        var p = players[i];
                        totals[p] = this.getTotalScore(state, p);
                    }
                    return { isEmpty: false, rows: rows, totals: totals, players: players, isTeam: true };
                },
                getHoleCount: function(state) {
                    var keys = Object.keys(state.teamScores);
                    if (keys.length > 0) {
                        return (state.teamScores[keys[0]] || []).length;
                    }
                    var oddKeys = Object.keys(state.oddPlayerScores);
                    if (oddKeys.length > 0) {
                        return (state.oddPlayerScores[oddKeys[0]] || []).length;
                    }
                    return 0;
                },
                getTotalScore: function(state, player) {
                    var total = 0;
                    for (var key in state.teamScores) {
                        var parts = key.split('-');
                        if (parts[0] === player || parts[1] === player) {
                            var scores = state.teamScores[key] || [];
                            var valid = scores.filter(function(s) { return s !== null && s !== undefined; });
                            total += valid.reduce(function(a, b) { return a + b; }, 0);
                        }
                    }
                    var oddScores = state.oddPlayerScores[player] || [];
                    var validOdd = oddScores.filter(function(s) { return s !== null && s !== undefined; });
                    total += validOdd.reduce(function(a, b) { return a + b; }, 0);
                    return total;
                },
                getPairingsForDisplay: function(state) {
                    return this.getPairsForCurrentHole(state);
                }
            };

            // ============================================================
            // UI RENDERER HELPERS
            // ============================================================
            function renderVersion(version) {
                document.getElementById('versionDisplay').textContent = 'Version ' + version;
            }

            function showToast(message) {
                var toast = document.getElementById('versionToast');
                var msgEl = document.getElementById('versionToastMessage');
                msgEl.textContent = message;
                toast.classList.add('show');
                var btn = document.getElementById('versionToastBtn');
                btn.onclick = function() {
                    toast.classList.remove('show');
                    clearTimeout(toast._timeout);
                };
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(function() {
                    toast.classList.remove('show');
                }, 6000);
            }

            function showCopyToast(message) {
                var toast = document.getElementById('copyToast');
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toast._copyTimeout);
                toast._copyTimeout = setTimeout(function() {
                    toast.classList.remove('show');
                }, 2500);
            }

            function renderHelpModal() {
                var content = document.getElementById('helpContent');
                content.innerHTML =
                    '<p><strong>How to use:</strong></p><ul><li><strong>Settings</strong> — Add players, choose game mode, then tap <strong>"Start round"</strong></li><li><strong>Play</strong> — Select scores and tap <strong>"Save hole"</strong></li><li><strong>History</strong> — View and edit scores from any hole</li><li><strong>Standings</strong> — See live rankings and total scores</li></ul><p><strong>Game modes:</strong></p><ul><li><strong>Individual</strong> — Each player scores their own game.</li><li><strong>Team (rotating pairs)</strong> — Players are paired each hole according to a schedule. Both players in a pair receive the same score.</li></ul><div class="privacy-badge"><strong>🔒 Privacy &amp; Data</strong><ul><li>All data is stored <strong>locally</strong> in your browser\'s Local Storage</li><li>No data is ever sent to any server — <strong>100% offline</strong></li><li>No cookies, no tracking, no analytics</li><li>Data is <strong>not</strong> shared between devices or browsers</li><li class="warn">⚠️ If you clear your browser cache/history, your scores will be lost</li></ul></div><p style="margin-top:12px;font-size:13px;color:#94a3b8;">Version ' +
                    APP_VERSION + ' · Open source</p>';
            }

            function setupModals() {
                // Help
                var helpBtn = document.getElementById('helpBtn');
                var helpModal = document.getElementById('helpModal');
                var helpClose = document.getElementById('helpCloseBtn');

                function openHelp() {
                    helpModal.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }

                function closeHelp() {
                    helpModal.classList.remove('active');
                    document.body.style.overflow = '';
                }
                helpBtn.addEventListener('click', openHelp);
                helpClose.addEventListener('click', closeHelp);
                helpModal.addEventListener('click', function(e) {
                    if (e.target === helpModal) closeHelp();
                });
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && helpModal.classList.contains('active')) closeHelp();
                });

                // Share
                var shareBtn = document.getElementById('shareBtn');
                var shareModal = document.getElementById('shareModal');
                var shareClose = document.getElementById('shareCloseBtn');
                var shareUrlInput = document.getElementById('shareUrlInput');
                var qrImg = document.getElementById('qrCodeImage');
                var copyBtn = document.getElementById('copyShareBtn');

                function openShare() {
                    var url = window.location.href.split('?')[0];
                    shareUrlInput.value = url;
                    qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(
                    url);
                    shareModal.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }

                function closeShare() {
                    shareModal.classList.remove('active');
                    document.body.style.overflow = '';
                }
                shareBtn.addEventListener('click', openShare);
                shareClose.addEventListener('click', closeShare);
                shareModal.addEventListener('click', function(e) {
                    if (e.target === shareModal) closeShare();
                });
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && shareModal.classList.contains('active')) closeShare();
                });

                copyBtn.addEventListener('click', function() {
                    var text = shareUrlInput.value;
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(text).then(function() {
                            showCopyToast('✅ Copied!');
                        }).catch(function() {
                            fallbackCopy(text);
                        });
                    } else {
                        fallbackCopy(text);
                    }
                });

                function fallbackCopy(text) {
                    var ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.select();
                    try {
                        document.execCommand('copy');
                        showCopyToast('✅ Copied!');
                    } catch (_) {
                        showCopyToast('❌ Copy failed.');
                    }
                    document.body.removeChild(ta);
                }
                shareUrlInput.addEventListener('click', function() { this.select(); });
            }

            // ============================================================
            // APP STATE & RENDER FUNCTIONS
            // ============================================================
            var state = loadState();
            var tabs = document.querySelectorAll('.tab-bar button');
            var sections = {
                playing: document.getElementById('tab-playing'),
                standings: document.getElementById('tab-standings'),
                history: document.getElementById('tab-history'),
                settings: document.getElementById('tab-settings')
            };

            function renderTab(tab) {
                state = loadState();
                switch (tab) {
                    case 'playing':
                        renderPlaying();
                        break;
                    case 'standings':
                        renderStandings();
                        break;
                    case 'history':
                        renderHistory();
                        break;
                    case 'settings':
                        renderSettings();
                        break;
                }
            }

            function renderPlaying() {
                var container = sections.playing;
                var mode = state.settings.gameMode || 'individual';

                if (state.phase === 'setup' || state.players.length === 0) {
                    container.innerHTML =
                        '<div class="text-center text-muted" style="padding:30px 0;"><p style="font-size:16px;">No active round</p><p style="font-size:14px; margin-top:8px;">Add players in Settings and start a round</p></div>';
                    return;
                }
                if (state.phase === 'complete') {
                    container.innerHTML =
                        '<div class="complete-msg">🏆 Round complete!</div><div class="complete-actions"><button id="newRoundFromPlayingBtn" class="success">New round</button></div>';
                    var newBtn = container.querySelector('#newRoundFromPlayingBtn');
                    if (newBtn) {
                        newBtn.addEventListener('click', function() {
                            if (confirm('Start a new round? All current data will be cleared.')) {
                                resetGame();
                            }
                        });
                    }
                    return;
                }

                var modeObj = mode === 'individual' ? IndividualMode : TeamMode;
                modeObj.renderPlay(state, container, {
                    onSaveHole: function() { handleSaveHole(); }
                });
            }

            function renderStandings() {
                var container = sections.standings;
                var mode = state.settings.gameMode || 'individual';
                var modeObj = mode === 'individual' ? IndividualMode : TeamMode;
                var data = modeObj.renderStandings(state);

                if (!data || data.length === 0) {
                    container.innerHTML = '<h2>Overall Standings</h2><div class="standings-empty">No data</div>';
                    return;
                }
                var html = '<h2>Overall Standings</h2><div class="standings-wrap"><table class="standings-table"><thead><tr><th>Rank</th><th>Player</th><th class="holes">Holes</th><th class="total">Total</th></tr></thead><tbody>';
                for (var i = 0; i < data.length; i++) {
                    var row = data[i];
                    var totalDisplay = row.total !== null ? row.total : '—';
                    html += '<tr><td class="rank">' + row.rank + '</td><td class="player-name">' + escapeHtml(row
                        .player) + '</td><td class="holes">' + row.holesPlayed + '</td><td class="total">' +
                        totalDisplay + '</td></tr>';
                }
                html += '</tbody></table></div>';
                container.innerHTML = html;
            }

            function renderHistory() {
                var container = sections.history;
                var mode = state.settings.gameMode || 'individual';
                var modeObj = mode === 'individual' ? IndividualMode : TeamMode;
                var historyData = modeObj.renderHistory(state);

                if (historyData.isEmpty) {
                    container.innerHTML =
                        '<h2>Hole History</h2><div class="history-controls"><button id="addHoleBtn" class="success">➕ Add hole</button><button id="clearHistoryBtn" class="danger">🗑️ Clear all scores</button></div><div class="history-empty">No holes played yet</div>';
                    attachHistoryControls(container);
                    return;
                }

                var rows = historyData.rows;
                var totals = historyData.totals;
                var players = historyData.players;
                var isTeam = historyData.isTeam || false;

                var html = '<h2>Hole History</h2><div class="history-controls"><button id="addHoleBtn" class="success">➕ Add hole</button><button id="clearHistoryBtn" class="danger">🗑️ Clear all scores</button></div><div class="history-table-wrap"><table class="history-table"><thead><tr><th>Hole</th>';
                for (var i = 0; i < players.length; i++) {
                    html += '<th>' + escapeHtml(players[i]) + '</th>';
                }
                html += '</tr></thead><tbody>';

                for (var r = 0; r < rows.length; r++) {
                    var row = rows[r];
                    html += '<tr><td class="hole-label">V' + row.hole + '</td>';
                    if (isTeam) {
                        var playerScores = {};
                        for (var key in row.pairs) {
                            var parts = key.split('-');
                            var val = row.pairs[key];
                            playerScores[parts[0]] = val;
                            playerScores[parts[1]] = val;
                        }
                        for (var p in row.odd) {
                            playerScores[p] = row.odd[p];
                        }
                        for (var i2 = 0; i2 < players.length; i2++) {
                            var p2 = players[i2];
                            var sc = playerScores[p2] !== undefined ? playerScores[p2] : 0;
                            html += '<td class="score-cell">' + sc + '</td>';
                        }
                    } else {
                        for (var i3 = 0; i3 < players.length; i3++) {
                            var p3 = players[i3];
                            var sc2 = row.scores[p3] !== undefined ? row.scores[p3] : 0;
                            html += '<td class="score-cell">' + sc2 + '</td>';
                        }
                    }
                    html += '</tr>';
                }

                html += '<tr class="total-row"><td class="hole-label"><strong>Total</strong></td>';
                for (var i4 = 0; i4 < players.length; i4++) {
                    var p4 = players[i4];
                    html += '<td><strong>' + totals[p4] + '</strong></td>';
                }
                html += '</tr></tbody></table></div>';
                container.innerHTML = html;
                attachHistoryControls(container);
            }

            function attachHistoryControls(container) {
                var addBtn = container.querySelector('#addHoleBtn');
                var clearBtn = container.querySelector('#clearHistoryBtn');

                if (addBtn) {
                    addBtn.addEventListener('click', function() {
                        if (state.players.length === 0) {
                            alert('Add players first.');
                            return;
                        }
                        var mode = state.settings.gameMode || 'individual';
                        if (mode === 'individual') {
                            for (var i = 0; i < state.players.length; i++) {
                                var p = state.players[i];
                                if (!state.scores[p]) state.scores[p] = [];
                                state.scores[p].push(null);
                            }
                        } else {
                            for (var key in state.teamScores) {
                                state.teamScores[key].push(null);
                            }
                            for (var i2 = 0; i2 < state.players.length; i2++) {
                                var p2 = state.players[i2];
                                if (!state.oddPlayerScores[p2]) state.oddPlayerScores[p2] = [];
                                state.oddPlayerScores[p2].push(null);
                            }
                        }
                        state.currentHole = (state.scores[state.players[0]] || []).length;
                        if (state.phase === 'complete') state.phase = 'playing';
                        saveState(state);
                        renderTab('history');
                        if (document.querySelector('.tab-bar .active').dataset.tab === 'playing') renderTab(
                        'playing');
                    });
                }

                if (clearBtn) {
                    clearBtn.addEventListener('click', function() {
                        if (!confirm('⚠️ Clear all scores? This cannot be undone!')) return;
                        var mode = state.settings.gameMode || 'individual';
                        if (mode === 'individual') {
                            for (var i = 0; i < state.players.length; i++) {
                                state.scores[state.players[i]] = [];
                            }
                        } else {
                            state.teamScores = {};
                            state.oddPlayerScores = {};
                            state.teamShuffleOrder = [];
                            state.teamShuffleIndex = 0;
                            state.teamHoleInShuffle = 0;
                            if (state.players.length > 0) {
                                TeamMode.init(state);
                            }
                        }
                        state.currentHole = 1;
                        state.phase = 'playing';
                        saveState(state);
                        renderTab('history');
                        if (document.querySelector('.tab-bar .active').dataset.tab === 'playing') renderTab(
                            'playing');
                    });
                }
            }

            function renderSettings() {
                var container = sections.settings;
                var players = state.players;

                var html = '<h2>Player Management</h2>';
                html +=
                    '<div class="setup-row"><input type="text" id="playerNameInput" placeholder="Player name" autocomplete="off" /><button id="addPlayerBtn">Add</button></div>';
                html += '<div class="player-list" id="playerList">';

                if (!players || players.length === 0) {
                    html += '<span class="text-muted" style="font-size:14px;">No players</span>';
                } else {
                    for (var i = 0; i < players.length; i++) {
                        var p = players[i];
                        html += '<span class="player-tag">' + escapeHtml(p) +
                            '<button class="remove-player" data-player="' + escapeHtml(p) +
                            '">✕</button></span>';
                    }
                }
                html += '</div>';

                html += '<div class="setup-options">';
                html +=
                    '<div class="setup-option"><label for="gameModeSelect">Game mode:</label><select id="gameModeSelect">';
                html += '<option value="individual"' + (state.settings.gameMode === 'individual' ? ' selected' : '') +
                    '>Individual</option>';
                html += '<option value="team"' + (state.settings.gameMode === 'team' ? ' selected' : '') +
                    '>Team (rotating pairs)</option>';
                html += '</select></div>';

                var oddVisible = state.settings.gameMode === 'team' ? '' : 'display:none;';
                html += '<div class="setup-option" id="oddPlayerOption" style="' + oddVisible +
                    '"><label for="oddPlayerSelect">Odd player handling:</label><select id="oddPlayerSelect">';
                html += '<option value="zero"' + (state.settings.oddPlayerHandling === 'zero' ? ' selected' : '') +
                    '>Odd player gets 0 (Par)</option>';
                html += '<option value="record"' + (state.settings.oddPlayerHandling === 'record' ? ' selected' : '') +
                    '>Record odd player\'s score</option>';
                html += '</select></div>';
                html += '</div>';

                html += '<div class="setup-actions">';
                html += '<button id="roundActionBtn" class="primary">' + getRoundActionLabel() + '</button>';
                html += '<button id="clearAllBtn" class="clear-all-btn">🗑️ Remove all players</button>';
                html += '</div>';

                container.innerHTML = html;

                // --- Event listeners ---
                var nameInput = document.getElementById('playerNameInput');
                var addBtn = document.getElementById('addPlayerBtn');
                var playerListEl = document.getElementById('playerList');
                var gameModeSelect = document.getElementById('gameModeSelect');
                var oddPlayerSelect = document.getElementById('oddPlayerSelect');
                var roundActionBtn = document.getElementById('roundActionBtn');
                var clearAllBtn = document.getElementById('clearAllBtn');

                // Add player
                addBtn.addEventListener('click', function() {
                    var name = nameInput.value.trim();
                    if (!name) { alert('Enter a name.'); return; }
                    if (state.players.includes(name)) { alert('Player already exists.'); return; }
                    state.players.push(name);
                    if (state.settings.gameMode === 'individual') {
                        state.scores[name] = [];
                    } else {
                        state.oddPlayerScores[name] = [];
                    }
                    if (state.removedPlayersHistory && state.removedPlayersHistory[name]) {
                        delete state.removedPlayersHistory[name];
                    }
                    saveState(state);
                    renderSettings();
                    // Focus back to input and select text
                    var newInput = document.getElementById('playerNameInput');
                    if (newInput) {
                        newInput.focus();
                        newInput.select();
                    }
                });

                // Enter key on name input
                nameInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addBtn.click();
                    }
                });

                // Remove player via delegation
                playerListEl.addEventListener('click', function(e) {
                    var btn = e.target.closest('.remove-player');
                    if (!btn) return;
                    var player = btn.dataset.player;
                    if (confirm('Remove player "' + player + '"?')) {
                        if (!state.removedPlayersHistory) state.removedPlayersHistory = {};
                        state.removedPlayersHistory[player] = true;
                        var idx = state.players.indexOf(player);
                        if (idx !== -1) {
                            state.players.splice(idx, 1);
                            delete state.scores[player];
                            delete state.oddPlayerScores[player];
                            for (var key in state.teamScores) {
                                if (key.includes(player)) {
                                    delete state.teamScores[key];
                                }
                            }
                            if (state.settings.gameMode === 'team') {
                                state.teamShuffleOrder = [];
                                state.teamShuffleIndex = 0;
                                state.teamHoleInShuffle = 0;
                                if (state.players.length > 0) {
                                    TeamMode.init(state);
                                }
                            }
                            saveState(state);
                            renderSettings();
                            renderTab('playing');
                        }
                    }
                });

                // Game mode change
                gameModeSelect.addEventListener('change', function() {
                    var mode = gameModeSelect.value;
                    state.settings.gameMode = mode;
                    state.scores = {};
                    state.teamScores = {};
                    state.oddPlayerScores = {};
                    state.teamShuffleOrder = [];
                    state.teamShuffleIndex = 0;
                    state.teamHoleInShuffle = 0;
                    if (mode === 'individual') {
                        for (var i2 = 0; i2 < state.players.length; i2++) {
                            state.scores[state.players[i2]] = [];
                        }
                    } else {
                        if (state.players.length > 0) {
                            TeamMode.init(state);
                        }
                    }
                    state.currentHole = 1;
                    state.phase = 'playing';
                    saveState(state);
                    renderSettings();
                    renderTab('playing');
                    document.getElementById('oddPlayerOption').style.display = mode === 'team' ? '' : 'none';
                });

                // Odd player handling change
                oddPlayerSelect.addEventListener('change', function() {
                    state.settings.oddPlayerHandling = oddPlayerSelect.value;
                    saveState(state);
                    renderTab('playing');
                });

                // Round action
                roundActionBtn.addEventListener('click', function() {
                    var label = roundActionBtn.textContent;
                    if (label.includes('Start')) {
                        startRound();
                    } else if (label.includes('End')) {
                        endRound();
                    } else if (label.includes('New')) {
                        if (confirm('Start a new round? All current data will be cleared.')) {
                            resetGame();
                        }
                    }
                });

                // Clear all players
                clearAllBtn.addEventListener('click', function() {
                    if (!confirm('⚠️ Remove all players? This will delete all data!')) return;
                    state.players = [];
                    state.scores = {};
                    state.teamScores = {};
                    state.oddPlayerScores = {};
                    state.removedPlayersHistory = {};
                    state.teamShuffleOrder = [];
                    state.teamShuffleIndex = 0;
                    state.teamHoleInShuffle = 0;
                    state.currentHole = 1;
                    state.phase = 'setup';
                    saveState(state);
                    renderSettings();
                    renderTab('playing');
                });

                // Focus input if on settings tab
                if (document.querySelector('.tab-bar .active') && document.querySelector('.tab-bar .active').dataset
                    .tab === 'settings') {
                    nameInput.focus();
                }
            }

            function getRoundActionLabel() {
                if (state.phase === 'setup' || state.players.length === 0) return '🚀 Start round';
                if (state.phase === 'playing') return '⏹️ End round';
                return '🔄 New round';
            }

            function startRound() {
                if (state.players.length === 0) { alert('Add at least one player.'); return; }
                var mode = state.settings.gameMode || 'individual';
                if (mode === 'individual') {
                    for (var i = 0; i < state.players.length; i++) {
                        state.scores[state.players[i]] = [];
                    }
                } else {
                    state.teamScores = {};
                    state.oddPlayerScores = {};
                    state.teamShuffleOrder = [];
                    state.teamShuffleIndex = 0;
                    state.teamHoleInShuffle = 0;
                    TeamMode.init(state);
                }
                state.currentHole = 1;
                state.phase = 'playing';
                saveState(state);
                renderSettings();
                tabs.forEach(function(b) { b.classList.remove('active'); });
                document.querySelector('[data-tab="playing"]').classList.add('active');
                Object.keys(sections).forEach(function(key) {
                    sections[key].classList.toggle('active', key === 'playing');
                });
                renderTab('playing');
            }

            function endRound() {
                if (confirm('End the current round? This will mark it as complete.')) {
                    state.phase = 'complete';
                    saveState(state);
                    renderSettings();
                    renderTab('playing');
                }
            }

            function resetGame() {
                state.players = [];
                state.scores = {};
                state.teamScores = {};
                state.oddPlayerScores = {};
                state.removedPlayersHistory = {};
                state.teamShuffleOrder = [];
                state.teamShuffleIndex = 0;
                state.teamHoleInShuffle = 0;
                state.currentHole = 1;
                state.phase = 'setup';
                saveState(state);
                renderSettings();
                renderTab('playing');
            }

            function handleSaveHole() {
                var mode = state.settings.gameMode || 'individual';
                var modeObj = mode === 'individual' ? IndividualMode : TeamMode;
                var success = modeObj.saveHole(state);
                if (!success) return;
                state.currentHole++;
                saveState(state);
                renderTab('playing');
                var activeTab = document.querySelector('.tab-bar .active');
                if (activeTab) {
                    var tab = activeTab.dataset.tab;
                    if (tab === 'standings') renderStandings();
                    if (tab === 'history') renderHistory();
                }
            }

            // ============================================================
            // INIT
            // ============================================================
            function init() {
                var versionUpdated = checkVersion();
                renderVersion(APP_VERSION);
                setupModals();
                renderHelpModal();

                document.getElementById('forceRefreshBtn').addEventListener('click', function() {
                    if (confirm('Load the latest version? This will refresh the page.')) {
                        localStorage.removeItem(VERSION_STORAGE_KEY);
                        window.location.href = window.location.href.split('?')[0] + '?v=' + Date.now();
                    }
                });

                if (!state.players || state.players.length === 0) {
                    state = getDefaultState();
                    state.settings = { ...DEFAULT_SETTINGS };
                }

                // Ensure settings exist
                if (!state.settings) state.settings = { ...DEFAULT_SETTINGS };
                if (!state.teamScores) state.teamScores = {};
                if (!state.oddPlayerScores) state.oddPlayerScores = {};
                if (!state.teamShuffleOrder) state.teamShuffleOrder = [];
                if (!state.teamShuffleIndex) state.teamShuffleIndex = 0;
                if (!state.teamHoleInShuffle) state.teamHoleInShuffle = 0;

                saveState(state);

                tabs.forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var tab = btn.dataset.tab;
                        tabs.forEach(function(b) { b.classList.remove('active'); });
                        btn.classList.add('active');
                        Object.keys(sections).forEach(function(key) {
                            sections[key].classList.toggle('active', key === tab);
                        });
                        renderTab(tab);
                    });
                });

                renderTab('playing');

                if (versionUpdated) {
                    showToast('🔄 New version ' + APP_VERSION + ' loaded!');
                }
                console.log('App initialized. Mode:', state.settings.gameMode);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
