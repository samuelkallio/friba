<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Disc Golf Score Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1>🥏 Disc Golf</h1>
            <div class="header-actions">
                <button class="header-btn" id="shareBtn" aria-label="Share">📤</button>
                <button class="header-btn" id="helpBtn" aria-label="Help">❓</button>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tab-bar" id="tabBar">
            <button class="active" data-tab="playing">🎯 Play</button>
            <button data-tab="standings">🏆 Standings</button>
            <button data-tab="history">📊 History</button>
            <button data-tab="settings">⚙️ Settings</button>
        </nav>

        <!-- Sections -->
        <section id="tab-playing" class="section active"></section>
        <section id="tab-standings" class="section"></section>
        <section id="tab-history" class="section"></section>
        <section id="tab-settings" class="section"></section>

        <!-- Modals -->
        <div class="modal-overlay" id="helpModal">
            <div class="modal">
                <div class="modal-header">
                    <h2>❓ Help</h2>
                    <button class="modal-close" id="helpCloseBtn">✕</button>
                </div>
                <div class="modal-body" id="helpContent"></div>
            </div>
        </div>

        <div class="modal-overlay" id="shareModal">
            <div class="modal">
                <div class="modal-header">
                    <h2>📤 Share</h2>
                    <button class="modal-close" id="shareCloseBtn">✕</button>
                </div>
                <div class="modal-body">
                    <p><strong>Scan the QR code</strong> or copy the link below.</p>
                    <div class="share-qr">
                        <img id="qrCodeImage" src="" alt="QR Code" />
                    </div>
                    <div class="share-url-container">
                        <input type="text" id="shareUrlInput" readonly />
                        <button id="copyShareBtn">📋 Copy</button>
                    </div>
                    <p class="text-muted" style="margin-top:12px;font-size:13px;">All data is stored locally on each device.</p>
                </div>
            </div>
        </div>

        <!-- Toast notifications -->
        <div class="toast" id="versionToast">
            <span id="versionToastMessage"></span>
            <button id="versionToastBtn">OK</button>
        </div>
        <div class="toast copy-toast" id="copyToast">✅ Copied!</div>

        <!-- Version info -->
        <footer class="version-info">
            <span id="versionDisplay">Version 1.2.0</span>
            <button id="forceRefreshBtn">🔄 Load latest</button>
        </footer>
    </div>

    <!-- JavaScript modules -->
    <script type="importmap">
        {
            "imports": {
                "/js/": "./js/"
            }
        }
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
